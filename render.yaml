services:
  - type: web
    name: giftnest
    runtime: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader
    preDeployCommand: php artisan migrate --force
    startCommand: php -S 0.0.0.0:$PORT -t public
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: giftnest-db
          property: connectionString
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: "120"

databases:
  - name: giftnest-db
    databaseName: giftnest
    user: giftnest
    plan: free
